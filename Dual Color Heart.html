<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Color Heart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let heartParticles = [];
        let particles = [];
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let time = 0;

        let pulseScale = 1;
        let pulseVelocity = 0;
        const pulseStiffness = 0.006;
        const pulseDamping = 0.88;
        const pulseRestScale = 1;

        function makeColor(isRight) {
            if (isRight) {
                const hue = 315 + Math.random() * 45;
                return `hsl(${hue},100%,${60 + Math.random() * 20}%)`;
            } else {
                const hue = 190 + Math.random() * 40;
                return `hsl(${hue},100%,${55 + Math.random() * 20}%)`;
            }
        }

        class Particle {
            constructor(x, y, isRight, fromFar = false) {
                this.isRight = isRight;
                this.color = makeColor(isRight);
                this.baseX = x;
                this.baseY = y;
                if (fromFar) {
                    const edge = Math.floor(Math.random() * 4);
                    if (edge === 0)      { this.x = Math.random() * canvas.width; this.y = -50; }
                    else if (edge === 1) { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; }
                    else if (edge === 2) { this.x = -50; this.y = Math.random() * canvas.height; }
                    else                 { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
                } else {
                    this.x = x;
                    this.y = y;
                }
                this.size = Math.random() * 1.2 + 0.4;
                this.vx = 0;
                this.vy = 0;
                this.stiffness = 0.045 + Math.random() * 0.02;
                this.damping   = 0.82  + Math.random() * 0.06;
                this.phaseOffset = Math.random() * Math.PI * 2;
                this.wobbleAmp   = Math.random() * 3 + 1;
                this.wobbleFreq  = Math.random() * 0.03 + 0.01;
                this.life  = 1;
                this.decay = Math.random() * 0.003 + 0.001;
            }

            update() {
                const wobble = Math.sin(time * this.wobbleFreq + this.phaseOffset) * this.wobbleAmp;
                const tx = this.baseX + wobble;
                const ty = this.baseY + wobble * 0.5;

                this.vx += (tx - this.x) * this.stiffness;
                this.vy += (ty - this.y) * this.stiffness;

                const mdx = this.x - mouseX;
                const mdy = this.y - mouseY;
                const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mdist < 180) {
                    const force = (180 - mdist) / 180;
                    this.vx += (mdx / mdist) * force * 4.5;
                    this.vy += (mdy / mdist) * force * 4.5;
                }

                this.vx *= this.damping;
                this.vy *= this.damping;
                this.x  += this.vx;
                this.y  += this.vy;
                this.life -= this.decay;
            }

            draw() {
                const stretch = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const elongation = Math.min(stretch * 0.6, 4);
                const angle = Math.atan2(this.vy, this.vx);
                ctx.save();
                ctx.globalAlpha = this.life * 0.95;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                ctx.translate(this.x, this.y);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size + elongation, this.size, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function heartPoint(t, scale) {
            const x = scale * 16 * Math.pow(Math.sin(t), 3);
            const y = -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x, y };
        }

        function createHeartShape() {
            heartParticles = [];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const count = 520;

            for (let i = 0; i < count; i++) {
                const t = (i / count) * Math.PI * 2;
                const { x, y } = heartPoint(t, 15);
                const isRight = x >= 0;
                heartParticles.push(new Particle(cx + x, cy + y, isRight, true));
            }
        }

        function updateHeartBases() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            if (time % 90 === 0) pulseVelocity += 0.08;

            pulseVelocity += (pulseRestScale - pulseScale) * pulseStiffness * 40;
            pulseVelocity *= pulseDamping;
            pulseScale += pulseVelocity;

            for (let i = 0; i < heartParticles.length; i++) {
                const t = (i / heartParticles.length) * Math.PI * 2;
                const { x, y } = heartPoint(t, 15 * pulseScale);
                heartParticles[i].baseX = cx + x;
                heartParticles[i].baseY = cy + y;
            }
        }

        function drawConnections() {
            for (let i = 0; i < heartParticles.length; i++) {
                for (let j = i + 1; j < heartParticles.length; j++) {
                    const dx = heartParticles[i].x - heartParticles[j].x;
                    const dy = heartParticles[i].y - heartParticles[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 45) {
                        const c = heartParticles[i].isRight ? '#ff69b4' : '#00bfff';
                        ctx.save();
                        ctx.globalAlpha = (1 - dist/45) * 0.18;
                        ctx.strokeStyle = c;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(heartParticles[i].x, heartParticles[i].y);
                        ctx.lineTo(heartParticles[j].x, heartParticles[j].y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            time++;
            updateHeartBases();

            heartParticles.forEach((p, i) => {
                p.update();
                p.draw();

                if (p.life <= 0) {
                    const t = (i / heartParticles.length) * Math.PI * 2;
                    const { x, y } = heartPoint(t, 15 * pulseScale);
                    const isRight = x >= 0;
                    heartParticles[i] = new Particle(canvas.width/2 + x, canvas.height/2 + y, isRight);
                }
            });

            if (time % 3 === 0) drawConnections();

            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('click', () => { pulseVelocity += 0.2; });
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createHeartShape();
        });

        createHeartShape();
        animate();
    </script>
</body>
</html>
